{% if is_detail == False %}
  <hr>
{% endif %}
<article>
  <ul>
    <li>
      Место: {{ post.location }}
    </li>
    <li>
      Дата: {{ post.date }}
    </li>
    <li>
      Категория: <a href="{% url 'blog:category_posts' category_id=post.category %}">{{ post.category }}</a>
    </li>
  </ul>
  {% if is_detail %}
    <p>
      {{ post.text|linebreaksbr }}
    </p>
  {% else %}
    <p>
      {{ post.text|truncatewords:10 }}
    </p>
    <a href="{% url 'blog:post_detail' post_id=post.id %}">Читать полный текст</a>
  {% endif %}
</article>
